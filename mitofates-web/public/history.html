<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>歷史記錄 - MitoFates</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; color: #333; max-width: 1200px; margin: auto; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .info-card { background: #f4f7f9; padding: 20px; border-radius: 8px; border-left: 5px solid #3498db; margin-bottom: 20px; }
        .info-label { font-weight: bold; color: #2c3e50; min-width: 100px; display: inline-block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }

        /* 進度條樣式 */
        .prob-bar-bg { width: 100px; background: #eee; height: 10px; border-radius: 5px; overflow: hidden; display: inline-block; vertical-align: middle; }
        .prob-bar-fill { height: 100%; transition: width 0.5s; }
        .prob-text { font-weight: bold; margin-right: 8px; display: inline-block; width: 45px; }

        .btn { background-color: #95a5a6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block; margin-top: 20px; cursor: pointer; }
        .btn:hover { background-color: #7f8c8d; }
        .loading { text-align: center; font-size: 1.2em; color: #3498db; margin-top: 50px; }

        .copy-text { color: #e00000; }
        .fade-animation { opacity: 1; animation-name: fadeOpacity; animation-iteration-count: 1; animation-timing-function: ease-in; animation-duration: 3s; }
        @keyframes fadeOpacity { 0% { opacity: 0; } 5% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; }}
    </style>
</head>
<body>
    <h1>MitoFates 14天內歷史記錄</h1>
    <div id="contentArea">
        <div class="loading">正在載入歷史記錄...</div>
    </div>
    <a href="/" class="btn">← 返回重新分析</a>
    <a onclick="removeAllRecords()" class="btn">刪除歷史記錄</a>

    <script>
        // 移除特定記錄
        function updatePastResult() {
            var updatedPastResult = '';
            for (const item of items) {
                if(item !== '') {
                    updatedPastResult += '|' + item;
                }
            }
            localStorage.setItem('pastResult', updatedPastResult.slice(1));
        }

        // 刪除單一記錄
        function removeRecord(i) {
            if (confirm('確定刪除記錄？')) {
                document.getElementById('info_' + i).remove();
                if (--itemCount === 0) {
                    document.getElementById('contentArea').innerHTML = `<a class="copy-text">沒有分析記錄</a>`;
                }
                items[items.length - i - 1] = '';
                updatePastResult();
            }
        }

        // 刪除所有記錄
        function removeAllRecords() {
            if (confirm('確定刪除所有歷史記錄？')) {
                localStorage.setItem('pastResult', '');
                document.getElementById('contentArea').innerHTML = `<a class="copy-text">沒有分析記錄</a>`;
            }
        }

        // 顯示歷史記錄
        const pastResult = localStorage.getItem('pastResult');
        if (pastResult == '') {
            document.getElementById('contentArea').innerHTML = `<a class="copy-text">沒有分析記錄</a>`;
        } else {
            var html = '';
            var items = pastResult.split('|').reverse();
            var itemCount = items.length;
            items.forEach((item, i) => {
                const itemArray = item.split(';');
                const id = itemArray[0];
                const dateTime = itemArray[1];
                const organism = itemArray[2];

                // 刪除過期記錄
                if (Math.abs(new Date() - new Date(dateTime)) > 14 * 24 * 60 * 60 * 1000) {
                    items[i] = '';
                    itemCount--;
                    return;
                }
                html += `
                    <div class="info-card" id="info_${i}">
                        <div><span class="info-label">任務 ID:</span> ${id}</div>
                        <div><span class="info-label">分析時間:</span> ${dateTime}</div>
                        <div><span class="info-label">生物類別:</span> ${organism}</div>
                        <a href="./result/${id}" class="btn">查看結果</a>
                        <a onclick="removeRecord(${i})" class="btn">刪除記錄</a>
                    </div>
                `;
            });
            
            if (itemCount === 0) {
                document.getElementById('contentArea').innerHTML = `<a class="copy-text">沒有分析記錄</a>`;
            } else {
                document.getElementById('contentArea').innerHTML = html;
            }
            updatePastResult();
        }
    </script>
</body>
</html>
